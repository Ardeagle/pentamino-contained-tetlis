<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テトリス・ペントミノエディション</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>TETRIS + PENTOMINO</h1>

<div id="startMenu">
        <div class="menu-card">
            <div class="menu-title">SELECT MODE</div>
            <button class="menu-btn" onclick="startGameMode('game')">ゲームスタート</button>
            <button class="menu-btn" onclick="startGameMode('practice')">練習モード</button>
            
            <button class="menu-btn" onclick="document.getElementById('optionsModal').style.display='flex'" style="background: #3300cc; border-color: #3a6070; margin-top: 15px;">設定とペンタミノ図鑑</button>
        </div>
    </div>

    <div id="optionsModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(6px);">
        
        <div class="panel-box" id="optionsAndLibraryPanel" style="position: relative; width: 350px; background: rgba(20,20,20,0.95); border: 2px solid #99bbee; padding: 25px 20px 20px 20px; border-radius: 12px; color: #eef0ff; box-shadow: 0 0 40px #99bbee40; max-height: 90vh; overflow-y: auto;">
        
            <button onclick="document.getElementById('optionsModal').style.display='none'" style="position: absolute; top: 8px; right: 12px; background: none; border: none; color: #888; font-size: 28px; cursor: pointer; line-height: 1; transition: 0.2s;" onmouseover="this.style.color='#eef0ff'" onmouseout="this.style.color='#888'">&times;</button>
    
            <div class="panel-title" style="color: #99bbee; font-weight: bold; margin-bottom: 15px; text-align: center; font-size: 16px; letter-spacing: 1px;">出現設定とミノ図鑑</div>
            <button onclick="document.getElementById('pairLibraryModal').style.display='flex'" style="width: 100%; margin-top: 15px; background: #3300cc; border: 1px solid #99bbee; color: #99bbee; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;" onmouseover="this.style.background='#3a6070'" onmouseout="this.style.background='#2a4050'">ミノ図鑑</button>
    
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 6px;">
                <span style="font-size: 13px; font-weight: bold; color: #fff;">ペントミノ出現方式</span>
                <select id="spawnModeSelect" style="background: #222; color: #99bbee; border: 1px solid #444; border-radius: 4px; padding: 4px; font-weight: bold; cursor: pointer;" onchange="handleDetailedOptionChange()">
                    <option value="random">Random Mix (ランダム)</option>
                    <option value="pair">Pair System (ペアで出現)</option>
                </select>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 13px; font-weight: bold; color: #eef0ff;">■ Basic(I,O,T,S,Z,L,J)</span>
                    <input type="checkbox" id="chkBasic" checked style="width: 16px; height: 16px; cursor: pointer;" onchange="handleDetailedOptionChange()">
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 13px; font-weight: bold; color: #ff88bb;">■ Alternative(I5,T5,Z5,S5,L5,J5)</span>
                    <input type="checkbox" id="chkAlternative" checked style="width: 16px; height: 16px; cursor: pointer;" onchange="handleDetailedOptionChange()">
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 13px; font-weight: bold; color: #99bbee;">■ Complex(P,G,N,R)</span>
                    <input type="checkbox" id="chkComplex" checked style="width: 16px; height: 16px; cursor: pointer;" onchange="handleDetailedOptionChange()">
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 13px; font-weight: bold; color: #ddee88;">■ Distorted(Y,B,F,E)</span>
                    <input type="checkbox" id="chkDistorted" checked style="width: 16px; height: 16px; cursor: pointer;" onchange="handleDetailedOptionChange()">
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 13px; font-weight: bold; color: #80ccac;">■ Exotic(X,V,W,U)</span>
                    <input type="checkbox" id="chkExotic" checked style="width: 16px; height: 16px; cursor: pointer;" onchange="handleDetailedOptionChange()">
                </div>
            </div>
            
                <div id="pentaMixSetting" style="display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 6px;">
                <div style="display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: bold; color: #fff;">
                    <span>Basic1巡に混ざるペントミノ数:</span>
                    <select id="pentaMixSelect" style="background: #222; color: #99bbee; border: 1px solid #444; border-radius: 4px; padding: 4px; cursor: pointer; font-weight: bold;" onchange="handleDetailedOptionChange()">
                        <option value="1">1 個</option>
                        <option value="2" selected>2 個</option>
                        <option value="4">4 個</option>
                        <option value="6">6 個</option>
                        <option value="8">8 個</option>
                        <option value="18">18 個</option>
                    </select>
                </div>
            </div>
            
            <div style="border-top: 1px solid #444; padding-top: 10px;">
            </div>
        </div>
    </div>
    <div id="pairLibraryModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9); z-index: 2500; justify-content: center; align-items: center; backdrop-filter: blur(8px);">
        <div class="panel-box" style="position: relative; width: 95%; max-width: 420px; background: rgba(20,20,20,0.95); border: 2px solid #99bbee; padding: 25px 20px 20px 20px; border-radius: 12px; color: #fff; max-height: 90vh; overflow-y: auto;">
            <button onclick="document.getElementById('pairLibraryModal').style.display='none'" style="position: absolute; top: 8px; right: 12px; background: none; border: none; color: #888; font-size: 28px; cursor: pointer; line-height: 1;">&times;</button>
            
            <div class="panel-title" style="color: #99bbee; text-align: center; margin-bottom: 15px; font-weight: bold; font-size: 16px;">PENTOMINO PAIRS</div>
            
            <div id="pairLibraryContent" style="display: flex; flex-direction: column; gap: 15px;"></div>
        </div>
    </div>

    <div class="game-container" id="gameContainer" style="position: relative;">
        <div id="gameOverOverlay">
            <h2>GAME OVER</h2>
            <button onclick="resetGame()">もう一度プレイ</button>
        </div>

        <div class="side-panel">
            <div class="panel-box">
                <div class="panel-title">HOLD</div>
                <canvas id="holdCanvas" width="100" height="100"></canvas>
            </div>
            <div class="panel-box">
                <div class="panel-title">SCORE</div>
                <div id="score" class="score-display">0</div>
            </div>
            <div class="panel-box">
                <div class="panel-title">LINES</div>
                <div id="lines" class="score-display" style="color: #edf2f7;">0</div>
            </div>
            
            <div id="practiceTools" class="panel-box" style="border-color: #ff88bb;">
                <div class="panel-title" style="color: #ff88bb;">PRACTICE</div>
                <button class="practice-btn" onclick="openMinoSelector()">召喚パレット</button>
                <button class="practice-btn" id="fallToggleBtn" onclick="toggleFalling()">落下: ON</button>
                <button class="practice-btn" onclick="clearField()">盤面クリア</button>
                <button class="practice-btn" onclick="backToMenu()" style="background:#442222; border-color:#884444; margin-top:5px;">メニュー</button>
            </div>
        </div>

        <canvas id="mainCanvas" width="300" height="600"></canvas>

        <div class="side-panel">
            <div class="panel-box">
                <div class="panel-title">NEXT (6)</div>
                <canvas id="nextCanvas" width="100" height="480"></canvas>
            </div>
        </div>
    </div>

    <div class="controls" id="controlButtons">
        <button onclick="playerRotate(-1)">↺ 左回転 (Z)</button>
        <button onclick="playerRotate(1)">↻ 右回転 (X)</button>
        <button onclick="playerHold()">HOLD (Space)</button>
        <button onclick="backToMenu()" style="background: #444;">メニューへ戻る (Esc)</button>
    </div>

    <div id="minoSelectorModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">ビジュアル召喚パレット</div>
                <button class="close-btn" onclick="closeMinoSelector()">&times;</button>
            </div>
            <div class="section-title">■ テトロミノ (7種)</div>
            <div class="mino-grid" id="tetroGrid"></div>
            
            <div class="section-title">■ ペントミノ (18種)</div>
            <div class="mino-grid" id="pentaGrid"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
